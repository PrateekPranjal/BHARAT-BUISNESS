<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Business</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="background-fx"></div>

    <div id="start-screen" class="start-screen">
        <div class="start-content">
            <h1 class="main-title">Bharat Business</h1>
            <div class="subtitle">The Game of Indian Trade</div>
            <button id="start-btn" class="btn-primary" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <div id="game-container" class="game-container hidden">
        <div class="board" id="board">
            <!-- Tiles generated by JS -->
            <div class="center-box">
                <div class="title">BHARAT<br>BUSINESS</div>
                <div class="dice-area">
                    <div class="dice-container">
                        <div id="die-1" class="die">
                            <div class="face front">1</div>
                            <div class="face back">6</div>
                            <div class="face right">3</div>
                            <div class="face left">4</div>
                            <div class="face top">5</div>
                            <div class="face bottom">2</div>
                        </div>
                        <div id="die-2" class="die">
                            <div class="face front">1</div>
                            <div class="face back">6</div>
                            <div class="face right">3</div>
                            <div class="face left">4</div>
                            <div class="face top">5</div>
                            <div class="face bottom">2</div>
                        </div>
                    </div>
                    <div id="dice-total" class="dice-total">Roll: -</div>
                    <button id="roll-btn" class="btn-primary">Roll Dice</button>
                    <button id="end-turn-btn" class="btn-secondary" disabled>End Turn</button>
                </div>
                <div id="message-log" style="margin-top: 10px; color: var(--accent-gold); min-height: 20px;">Welcome!
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="player-panel" id="player-panel">
                <!-- Player stats -->
            </div>
            <div id="tile-details-panel" class="tile-details-panel">
                <h3>Property Details</h3>
                <div id="tile-info-content">Hover over a tile...</div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="property-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Property Name</h2>
            <p id="modal-price">Price: ₹0</p>
            <p id="modal-rent">Rent: ₹0</p>
            <div class="modal-actions">
                <button id="buy-btn" class="btn-success">Buy</button>
                <button id="pass-btn" class="btn-danger">Pass</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
